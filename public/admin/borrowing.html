<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borrowing · Repair Zone Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/css/styles.css?v=2" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>" />
</head>
<body>
  <div class="stripe"></div>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="/admin">
        <img class="logo" src="/images/logo.png" alt="The Repair Zone" width="684" height="448" />
        <span class="muted" style="font-weight:600;">· Admin</span>
      </a>
      <div class="nav-links">
        <a href="/admin/sheet">Overview</a>
        <a href="/admin">Repairs</a>
        <a href="/admin/borrowing">Borrowing</a>
        <a href="#" id="logout" style="display:none;">Sign out</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">◐</button>
      </div>
    </nav>
  </header>

  <main class="container" id="gate" style="display:none;">
    <div class="form-card gate">
      <h2 style="margin-top:0;">🔒 Staff sign-in</h2>
      <p class="muted">Enter the admin token to manage tool borrowing.</p>
      <div class="notice" id="gate-notice"></div>
      <div class="field"><label for="token">Admin token</label><input type="password" id="token" placeholder="••••••••••••" /></div>
      <button class="btn btn-primary" id="gate-btn" style="width:100%;">Sign in</button>
    </div>
  </main>

  <main class="container" id="panel" style="display:none;padding-top:28px;padding-bottom:60px;">
    <div class="toolbar">
      <h1 style="margin:0;font-size:1.5rem;">Tool borrowing</h1>
      <div class="spacer"></div>
      <button class="btn btn-primary btn-sm" onclick="openCheckout()">Check out a tool</button>
      <button class="btn btn-ghost btn-sm" onclick="load()">↻</button>
    </div>

    <div class="stats" id="stats"></div>
    <div class="notice" id="notice"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search tool, borrower, category, booth…" style="max-width:320px;" />
      <div class="spacer"></div>
    </div>

    <h2 class="section-title" style="font-size:1.2rem;margin:10px 0 12px;">Currently loaned out</h2>
    <div class="table-wrap" style="margin-bottom:32px;">
      <table>
        <thead><tr><th>Tool</th><th>Borrower</th><th>Booth</th><th>Phone</th><th>Out since</th><th>Actions</th></tr></thead>
        <tbody id="active"><tr><td colspan="6" class="muted">Loading…</td></tr></tbody>
      </table>
    </div>

    <h2 class="section-title" style="font-size:1.2rem;margin:10px 0 12px;">Rental log</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Tool</th><th>Borrower</th><th>Booth</th><th>Phone</th><th>Out</th><th>In</th><th>Status</th></tr></thead>
        <tbody id="rentals"><tr><td colspan="8" class="muted">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>

  <!-- Checkout modal -->
  <div class="modal-backdrop" id="checkout-modal">
    <div class="modal">
      <h3>Check out a tool</h3>
      <div class="notice" id="checkout-notice"></div>
      <div class="field"><label for="co-tool">Tool <span class="req">*</span></label><input type="text" id="co-tool" maxlength="160" placeholder="e.g. Soldering iron, multimeter, drill…" /></div>
      <div class="field"><label for="co-name">Borrower name <span class="req">*</span></label><input type="text" id="co-name" /></div>
      <div class="form-row">
        <div class="field"><label for="co-booth">Booth ID</label><input type="text" id="co-booth" /></div>
        <div class="field"><label for="co-phone">Phone</label><input type="tel" id="co-phone" /></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost btn-sm" onclick="closeModals()">Cancel</button>
        <button class="btn btn-primary btn-sm" id="co-save">Check out</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/borrowing.js"></script>
</body>
</html>
