<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borrow a Tool · The Repair Zone</title>
  <meta name="description" content="Borrow a tool from The Repair Zone at Open Sauce." />
  <link rel="stylesheet" href="/css/styles.css?v=3" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='%23f97316' viewBox='0 0 16 16'><path d='M1 0 0 1l2.2 3.081a1 1 0 0 0 .815.419h.07a1 1 0 0 1 .708.293l2.675 2.675-2.617 2.654A3.003 3.003 0 0 0 0 13a3 3 0 1 0 5.878-.851l2.654-2.617.968.968-.305.914a1 1 0 0 0 .242 1.023l3.27 3.27a.997.997 0 0 0 1.414 0l1.586-1.586a.997.997 0 0 0 0-1.414l-3.27-3.27a1 1 0 0 0-1.023-.242L10.5 9.5l-.96-.96 2.68-2.643A3.005 3.005 0 0 0 16 3q0-.405-.102-.777l-2.14 2.141L12 4l-.364-1.757L13.777.102a3 3 0 0 0-3.675 3.68L7.462 6.46 4.793 3.793a1 1 0 0 1-.293-.707v-.071a1 1 0 0 0-.419-.814zm9.646 10.646a.5.5 0 0 1 .708 0l2.5 2.5a.5.5 0 0 1-.708.708l-2.5-2.5a.5.5 0 0 1 0-.708M3 11l.471.242.529.026.287.445.445.287.026.529L5 13l-.242.471-.026.529-.445.287-.287.445-.529.026L3 15l-.471-.242L2 14.732l-.287-.445L1.268 14l-.026-.529L1 13l.242-.471.026-.529.445-.287.287-.445.529-.026z'/></svg>" />
</head>
<body>
  <div class="stripe"></div>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="/" aria-label="The Repair Zone — home">
        <img class="logo" src="/images/logo.png" alt="The Repair Zone" width="684" height="448" />
      </a>
      <div class="nav-links">
        <a href="/repair">Request a repair</a>
        <a href="/borrow">Borrow a tool</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
      </div>
    </nav>
  </header>

  <main class="container narrow" style="padding-top:40px;">
    <span class="eyebrow">🧰 Tool lending</span>
    <h1 style="margin:16px 0 8px;">Borrow a tool</h1>
    <p class="muted" style="margin-top:0;">Type what you're taking so we can track it. Tools must be returned by <strong>end of day</strong> unless a lead says otherwise.</p>

    <div class="form-card" style="margin-top:24px;">
      <div class="notice" id="notice"></div>

      <div id="success-panel" style="display:none;">
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:3rem;">🧰</div>
          <h2 id="success-title">Checked out!</h2>
          <p class="muted" id="success-body"></p>
          <div style="margin-top:20px;">
            <button class="btn btn-primary" onclick="location.reload()">Borrow another</button>
          </div>
        </div>
      </div>

      <form id="borrow-form">
        <div class="field">
          <label for="toolName">What are you borrowing? <span class="req">*</span></label>
          <input type="text" id="toolName" name="toolName" required maxlength="160" placeholder="e.g. Soldering iron, multimeter, screwdriver set…" />
        </div>

        <div class="form-row">
          <div class="field">
            <label for="name">Your name <span class="req">*</span></label>
            <input type="text" id="name" name="name" autocomplete="name" required maxlength="120" />
          </div>
          <div class="field">
            <label for="phone">Phone number <span class="req">*</span></label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" required maxlength="40" placeholder="555-123-4567 (or e.g. “leaving ID as deposit”)" />
          </div>
        </div>

        <div class="field">
          <label for="boothId">Booth ID / location <span class="req">*</span></label>
          <input type="text" id="boothId" name="boothId" required maxlength="60" placeholder="e.g. Hall B, Booth 214" />
        </div>

        <div class="field">
          <label class="check">
            <input type="checkbox" id="agreedTerms" required />
            <span>I have read and agree to the <a href="/terms#rental" target="_blank">Tool Rental Terms</a>. I'll follow safety instructions, use PPE where needed, take reasonable care, and return the tool clean and working by end of day. I understand <strong>I'll sign the rental agreement on paper at the booth</strong> when I pick up the tool. <span class="req">*</span></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;">Check out this tool</button>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container row">
      <div><strong>The Repair Zone</strong> · Open Sauce volunteer booth.</div>
      <div><a href="/repair">Repair</a> · <a href="/borrow">Borrow</a> · <a href="/waiver">Waiver</a> · <a href="/terms">Terms</a></div>
    </div>
  </footer>

  <script src="/js/common.js?v=3"></script>
  <script src="/js/borrow.js?v=3"></script>
</body>
</html>
