<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Repair Zone · Open Sauce</title>
  <meta name="description" content="Request a repair or borrow a tool from The Repair Zone at Open Sauce." />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>" />
</head>
<body>
  <div class="stripe"></div>
  <header class="site-header">
    <nav class="nav container">
      <a class="brand" href="/">
        <svg class="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="48" height="48" rx="11" fill="#f97316"/>
          <path d="M31.5 15.5a6 6 0 0 1-7.8 7.8L15 32l1 1 8.7-8.7a6 6 0 0 1 7.8-7.8l-3.2 3.2 1.8 1.8 3.2-3.2Z" fill="#fff" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="17" cy="31" r="2" fill="#f97316"/>
        </svg>
        The Repair Zone
      </a>
      <div class="nav-links">
        <a href="/repair">Request a repair</a>
        <a href="/borrow">Borrow a tool</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle dark mode">◐</button>
      </div>
    </nav>
  </header>

  <main class="container narrow" style="padding-top:64px;padding-bottom:64px;text-align:center;">
    <span class="eyebrow">🔧 The Repair Zone · Open Sauce</span>
    <h1 style="margin:16px 0 8px;">What do you need?</h1>
    <p class="muted" style="margin-top:0;">Free repairs and tool lending at the booth.</p>

    <div class="hero-cta" style="justify-content:center;margin-top:32px;">
      <a href="/repair" class="btn btn-primary" style="font-size:1.05rem;padding:16px 26px;">🔧 Request a repair</a>
      <a href="/borrow" class="btn btn-ghost" style="font-size:1.05rem;padding:16px 26px;">🧰 Borrow a tool</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container row">
      <div><strong>The Repair Zone</strong> · Open Sauce volunteer booth.</div>
      <div><a href="/repair">Repair</a> · <a href="/borrow">Borrow</a> · <a href="/terms">Terms</a></div>
    </div>
  </footer>

  <script src="/js/common.js"></script>
</body>
</html>
